<!doctype html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Attendance Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #4f46e5;
      --primary-light: #818cf8;
      --primary-dark: #3730a3;
      --success: #059669;
      --success-bg: #d1fae5;
      --danger: #dc2626;
      --danger-bg: #fee2e2;
      --info: #2563eb;
      --info-bg: #dbeafe;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-400: #94a3b8;
      --gray-500: #64748b;
      --gray-700: #334155;
      --gray-900: #0f172a;
      --radius: 16px;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }

    .wrapper {
      width: 100%;
      max-width: 440px;
    }

    .branding {
      text-align: center;
      margin-bottom: 1.5rem;
      color: white;
    }

    .branding .icon {
      width: 56px;
      height: 56px;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
      margin-bottom: 0.75rem;
    }

    .branding h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .branding p {
      font-size: 0.875rem;
      opacity: 0.85;
      margin-top: 0.25rem;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: var(--radius);
      padding: 2rem 1.5rem;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.3);
      animation: slideUp 0.5s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--gray-700);
      margin-bottom: 0.375rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .form-group input[type="text"] {
      width: 100%;
      padding: 0.875rem 1rem;
      border-radius: 12px;
      border: 2px solid var(--gray-200);
      font-size: 0.95rem;
      font-family: inherit;
      color: var(--gray-900);
      background: var(--gray-50);
      transition: all 0.2s ease;
      outline: none;
    }

    .form-group input[type="text"]::placeholder {
      color: var(--gray-400);
    }

    .form-group input[type="text"]:focus {
      border-color: var(--primary-light);
      background: white;
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 1rem;
      border-radius: 12px;
      border: none;
      font-weight: 600;
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      margin-top: 0.5rem;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(79, 70, 229, 0.35);
    }

    .btn-secondary {
      background: var(--gray-100);
      color: var(--gray-700);
      border: 2px solid var(--gray-200);
    }

    .btn-secondary:hover:not(:disabled) {
      background: var(--gray-200);
    }

    /* Hidden file input */
    #file-input {
      display: none;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1rem 0;
      color: var(--gray-400);
      font-size: 0.8rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gray-200);
    }

    /* Preview image */
    .preview-area {
      margin-top: 1rem;
      display: none;
      border-radius: 14px;
      overflow: hidden;
      border: 3px solid var(--primary-light);
      animation: fadeIn 0.3s ease;
      text-align: center;
      background: var(--gray-50);
      padding: 1rem;
    }

    .preview-area img {
      max-width: 100%;
      max-height: 250px;
      border-radius: 8px;
    }

    .preview-area p {
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: var(--gray-500);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* Status */
    .status {
      margin-top: 1.25rem;
      padding: 1rem 1.25rem;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 500;
      text-align: center;
      display: none;
      animation: fadeIn 0.3s ease;
      line-height: 1.5;
    }

    .success {
      background: var(--success-bg);
      color: var(--success);
      border: 1px solid rgba(5, 150, 105, 0.15);
    }

    .error {
      background: var(--danger-bg);
      color: var(--danger);
      border: 1px solid rgba(220, 38, 38, 0.15);
    }

    .loading {
      background: var(--info-bg);
      color: var(--info);
      border: 1px solid rgba(37, 99, 235, 0.15);
    }

    /* Manual input section */
    .manual-section {
      margin-top: 0.5rem;
    }

    .manual-section .form-group {
      margin-bottom: 0.75rem;
    }

    .footer {
      text-align: center;
      margin-top: 1.5rem;
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.8rem;
    }

    /* Responsive */
    @media (max-width: 480px) {

      body {
        padding: 0.75rem;
        align-items: flex-start;
        padding-top: 2rem;
      }

      .branding h1 {
        font-size: 1.3rem;
      }

      .card {
        padding: 1.5rem 1.25rem;
      }

      .form-group input[type="text"] {
        padding: 0.75rem 0.875rem;
      }
    }

    @media (max-width: 360px) {
      html {
        font-size: 14px;
      }
    }

    @media (min-width: 768px) {
      .card {
        padding: 2.5rem 2rem;
      }
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 6px;
    }

    .spinner-dark {
      border-color: rgba(0, 0, 0, 0.15);
      border-top-color: var(--gray-700);
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <div class="branding">
      <div class="icon">📋</div>
      <h1>QR Attendance</h1>
      <p>Scan QR Code untuk presensi</p>
    </div>

    <div class="card">
      <div class="form-group">
        <label>User ID</label>
        <input type="text" id="user_id" placeholder="Masukkan User ID kamu" autocomplete="off" />
      </div>

      <div class="form-group">
        <label>Device ID</label>
        <input type="text" id="device_id" placeholder="Masukkan Device ID kamu" autocomplete="off" />
      </div>

      <!-- Tombol foto QR (pakai file input + capture, bisa jalan di iframe) -->
      <button class="btn btn-primary" id="btn-photo" onclick="openCamera()">
        Ambil Foto QR Code
      </button>
      <input type="file" id="file-input" accept="image/*" capture="environment" />

      <!-- Preview foto -->
      <div class="preview-area" id="preview-area">
        <img id="preview-img" src="" alt="Preview" />
        <p>Memproses QR Code...</p>
      </div>

      <!-- Divider -->
      <div class="divider">atau masukkan token manual</div>

      <!-- Manual input fallback -->
      <div class="manual-section">
        <div class="form-group">
          <label>Token QR</label>
          <input type="text" id="manual_token" placeholder="Contoh: TKN-A1B2C3" autocomplete="off" />
        </div>
        <button class="btn btn-secondary" id="btn-manual" onclick="manualCheckIn()">
          ✏️ Kirim Token Manual
        </button>
      </div>

      <div id="status" class="status"></div>
    </div>

    <p class="footer">Cloud Computing &mdash; Presence System</p>
  </div>

  <script>
    var baseUrl =
      "https://script.google.com/macros/s/AKfycbwRWRN2Nn3vvDzWNO8IYinc449oZcnyCCC3NJmzqTX0gSnOyFpEzo4Giap3nYEwg39M4g/exec";

    var fileInput = document.getElementById("file-input");
    var btnPhoto = document.getElementById("btn-photo");
    var btnManual = document.getElementById("btn-manual");
    var previewArea = document.getElementById("preview-area");
    var previewImg = document.getElementById("preview-img");

    // Buka kamera via file input (works in iframe / Apps Script)
    function openCamera() {
      if (!validate()) {
        showStatus("Lengkapi User ID dan Device ID terlebih dahulu", "error");
        return;
      }
      fileInput.click();
    }

    // Ketika user selesai ambil foto
    fileInput.addEventListener("change", function (e) {
      var file = e.target.files[0];
      if (!file) return;

      // Tampilkan preview
      previewArea.style.display = "block";
      previewImg.src = URL.createObjectURL(file);

      btnPhoto.disabled = true;
      btnPhoto.innerHTML = '<span class="spinner"></span> Memproses...';
      showStatus("Membaca QR Code dari foto...", "loading");

      // Decode QR dari file gambar
      var html5QrCode = new Html5Qrcode("preview-area");
      html5QrCode.scanFile(file, true)
        .then(function (decodedText) {
          showStatus("QR terdeteksi: " + decodedText + " — Mengirim...", "loading");
          sendCheckIn(decodedText);
        })
        .catch(function (err) {
          showStatus("❌ QR Code tidak terdeteksi di foto. Coba ambil foto lebih jelas atau masukkan token manual.", "error");
          resetPhotoButton();
        });

      fileInput.value = "";
    });

    // Manual token input
    function manualCheckIn() {
      if (!validate()) {
        showStatus("Lengkapi User ID dan Device ID terlebih dahulu", "error");
        return;
      }

      var token = document.getElementById("manual_token").value.trim();
      if (!token) {
        showStatus("Masukkan token QR terlebih dahulu", "error");
        return;
      }

      btnManual.disabled = true;
      btnManual.innerHTML = '<span class="spinner spinner-dark"></span> Mengirim...';
      sendCheckIn(token);
    }

    function validate() {
      return (
        document.getElementById("user_id").value.trim() &&
        document.getElementById("device_id").value.trim()
      );
    }

    function resetPhotoButton() {
      btnPhoto.disabled = false;
      btnPhoto.innerHTML = 'Ambil Foto QR Code';
      previewArea.style.display = "none";
    }

    function resetManualButton() {
      btnManual.disabled = false;
      btnManual.innerHTML = 'Kirim Token Manual';
    }

    function sendCheckIn(token) {
      showStatus("Mengirim data presensi...", "loading");

      var data = {
        user_id: document.getElementById("user_id").value.trim(),
        device_id: document.getElementById("device_id").value.trim(),
        qr_token: token,
        timestamp: new Date().toISOString(),
      };

      fetch(baseUrl + "?path=presence/checkin", {
        method: "POST",
        redirect: "follow",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(data),
      })
        .then(function (res) { return res.json(); })
        .then(function (result) {
          if (result.ok) {
            showStatus(
              "✅ Presensi Berhasil!\n" + result.data.course_id + " — Sesi " + result.data.session_id,
              "success"
            );
          } else {
            var msgs = {
              token_invalid: "Token QR tidak valid",
              token_expired: "Token QR sudah kadaluarsa",
              already_checked_in: "Kamu sudah presensi di sesi ini",
              missing_field: "Data tidak lengkap",
            };
            showStatus("❌ " + (msgs[result.error] || result.error), "error");
          }
          resetPhotoButton();
          resetManualButton();
        })
        .catch(function (e) {
          showStatus("Tidak dapat menghubungi server. Coba lagi.", "error");
          resetPhotoButton();
          resetManualButton();
        });
    }

    function showStatus(msg, type) {
      var el = document.getElementById("status");
      el.innerText = msg;
      el.className = "status " + type;
      el.style.display = "block";
    }
  </script>
</body>

</html>
