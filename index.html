<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Presensi - Cloud Computing</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Dashboard Presensi Mahasiswa</h1>
    <p>Mata Kuliah: Cloud Computing</p>
  </header>

  <main class="container">
    <section class="qr-section">
      <div class="card">
        <h2>Scan QR Code</h2>
        
        <div style="margin-bottom: 1.5rem; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #eee;">
          <label style="display: block; font-size: 0.9rem; color: #555; margin-bottom: 5px; font-weight: bold;">ID Mata Kuliah:</label>
          <input type="text" id="input-course" value="CC-101" style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
          
          <label style="display: block; font-size: 0.9rem; color: #555; margin-bottom: 5px; font-weight: bold;">ID Sesi:</label>
          <input type="text" id="input-session" value="SES-01" style="width: 100%; padding: 8px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
          
          <button onclick="generateQR()" style="width: 100%; padding: 10px; background: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">
            Terapkan & Generate Sesi Baru
          </button>
        </div>
        <p class="subtitle">Buka aplikasi presensi Anda dan scan QR di bawah ini.</p>
        <div class="qr-container">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=ContohToken123" alt="QR Code Presensi" id="qr-image">
        </div>
        <p class="timer">Berlaku selama: <span id="time-left">30</span> detik</p>
      </div>
    </section>

    <section class="list-section">
      <div class="card">
        <div class="tabs">
          <h2 class="tab active">Belum Absen <span class="badge" id="count-belum">3</span></h2>
          <h2 class="tab">Sudah Absen <span class="badge success" id="count-sudah">2</span></h2>
        </div>

        <ul class="student-list" id="list-belum">
          </ul>

        <ul class="student-list" id="list-sudah">
          </ul>
      </div>
    </section>
  </main>
  
  <script src="script.js"></script>
</body>
</html>
